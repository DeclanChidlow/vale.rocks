- title: New Year
  description: The arrival of a new year.
  date: 01-01
- title: Leap Year Day
  description: Fixing our calendar's slight drift from the Earth's orbit.
  date: 02-29
- title: Beginning of Q2.
  description: The first quarter of the year has been vanquished, and now the second takes its place.
  date: 04-01
- title: ANZAC Day
  description: >-
    Australian and Aotearoa New Zealand national day of remembrance marking the 1915 Gallipoli landings.
    <blockquote cite="https://www.awm.gov.au/articles/encyclopedia/ode"><p>
    They shall grow not old, as we that are left grow old:<br>
    Age shall not weary them, nor the years condemn.<br>
    At the going down of the sun and in the morning <br>
    We will remember them.
    </p></blockquote>
  date: 04-25
- title: Beginning of Q3.
  description: Half the year passed, with one half to go.
  date: 07-01
- title: Beginning of Q4.
  description: Three quarters down, one more remaining.
  date: 10-01
- title: Vale.Rocks Domain Anniversary
  description: The domain vale.rocks was registered on this day in 2022. This has made a lot of people very angry and been widely regarded as a bad move.
  date: 09-17
